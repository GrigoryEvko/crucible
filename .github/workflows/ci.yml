# Crucible CI.
#
# Two tiers:
#
#   * guards — the bash/ripgrep discipline suite (the `ci_guard`-labelled
#              ctest registrations in test/CMakeLists.txt). Pure source-tree
#              scans, no compiler. Runs on stock ubuntu-latest, every push/PR.
#
#   * build  — the full compile / run / negative-compile / golden-binary suite
#              (`cmake --preset default` -> build -> `ctest --preset default`),
#              in a PUBLIC `fedora:rawhide` container with stock GCC 16.1.1,
#              wired via CRUCIBLE_CXX=/usr/bin/g++. cmake/Toolchain-gcc16.cmake
#              derives the matching gcc-ar / gcc-ranlib siblings + rpath from
#              that compiler basename, so no patched toolchain is needed.
#              Aggressively cached (public repo, free cache): ccache wraps the
#              compiler (objects restored across runs via actions/cache, so a
#              warm cache turns the ~150-TU C++26 build into mostly hits), and
#              /var/cache/dnf is cached so the rawhide package install skips
#              re-downloads. ccache cannot corrupt output — a hash miss just
#              recompiles, and any stale hit would surface as a ctest failure.
#
# Toolchain honesty: the dev `default` preset uses a locally-built GCC 16.1.1
# with ONE extra commit cherry-picked — PR c++/124241, the contracts consteval-
# cache-bypass fix (branch gcc-16-patched @ 81c597f716e, a single commit on top
# of releases/gcc-16.1.0). Stock Fedora gcc-16.1.1 differs ONLY by that commit.
# The CRUCIBLE_PRE / CRUCIBLE_POST migration (safety/Pre.h, safety/Post.h)
# exists precisely so the consteval-bypass-sensitive contracts fire identically
# on stock GCC, which is why the stock-Fedora build is a valid gate. Locally
# verified: stock /usr/bin/g++ configures the tree, compiles the library AND
# every test TU, and runs the wrapper/federation suites green; the only extra
# container packages are the sanitizer + BPF RUNTIMES (libasan/libubsan/
# libbpf-devel), which Fedora ships separately from gcc-c++. For byte-exact
# parity with the dev compiler an optional self-hosted job carries the patched
# toolchain (see `build-patched-parity`, gated to workflow_dispatch).
#
# The guard list below is kept in 1:1 correspondence with the `ci_guard`
# registrations in test/CMakeLists.txt. When a guard is added/removed there,
# mirror it here (the scripts are invoked directly so the guard tier needs no
# CMake configure step at all).

name: ci

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Toolchain-FREE discipline guards. Stock ubuntu-latest runner. No compiler,
  # no CMake configure, no build artifacts — pure source-tree scans.
  # ---------------------------------------------------------------------------
  guards:
    name: discipline guards (toolchain-free)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ripgrep

      # Each step mirrors a `ci_guard`-labelled ctest registration in
      # test/CMakeLists.txt, invoked with the same arguments. Scripts run from
      # the repo root (== ${CMAKE_SOURCE_DIR}). Self-test variants prove the
      # guard FIRES on a planted violation; the bare variant scans the real
      # tree. A nonzero exit fails the job.

      - name: trait injection guard
        run: bash scripts/check-trait-injection.sh

      # NOTE: the session-persistence include audit is NOT here — it runs a
      # real `g++ -H` compile (needs GCC 16 + the header tree), so it lives in
      # the `build` job below, not this toolchain-free tier.

      - name: contract cite regression (pre-callsite count vs baseline)
        run: bash scripts/audit-pre-callsite-count.sh --check scripts/contracts-baseline.json

      - name: contract decide-cite ratio
        run: bash scripts/audit-decide-cite-ratio.sh

      - name: refined/pre subsumption (self-test + scan)
        run: |
          bash scripts/check-refined-pre-subsumption.sh --self-test
          bash scripts/check-refined-pre-subsumption.sh

      - name: fixy discipline (self-test + scan)
        run: |
          bash scripts/check-fixy-discipline.sh --self-test
          bash scripts/check-fixy-discipline.sh

      - name: mint pattern (self-test + scan)
        run: |
          bash scripts/check-mint-pattern.sh --self-test
          bash scripts/check-mint-pattern.sh

      - name: permission storage antipattern (self-test + scan)
        run: |
          bash scripts/check-permission-storage.sh --self-test
          bash scripts/check-permission-storage.sh

      - name: no vector::reserve (self-test + scan)
        run: |
          bash scripts/check-no-reserve.sh --self-test
          bash scripts/check-no-reserve.sh

      - name: no raw fstream (self-test + scan)
        run: |
          bash scripts/check-no-raw-ofstream.sh --self-test
          bash scripts/check-no-raw-ofstream.sh

      - name: fixy hardware discipline (self-test + scan)
        run: |
          bash scripts/check-fixy-hw-discipline.sh --self-test
          bash scripts/check-fixy-hw-discipline.sh

      - name: no reinterpret_cast (self-test + scan)
        run: |
          bash scripts/check-no-reinterpret-cast.sh --self-test
          bash scripts/check-no-reinterpret-cast.sh

      - name: no -ffast-math (self-test + scan)
        run: |
          bash scripts/check-no-ffast-math.sh --self-test
          bash scripts/check-no-ffast-math.sh

      - name: fixy clean headers (self-test + scan)
        run: |
          bash scripts/check-fixy-clean-headers.sh --self-test
          bash scripts/check-fixy-clean-headers.sh

      - name: fixy dimension prose
        run: bash scripts/check-fixy-dim-prose.sh

      - name: syscall capability admission (self-test + scan)
        run: |
          bash scripts/check-syscall-capability.sh --self-test
          bash scripts/check-syscall-capability.sh

      - name: spawn discipline (self-test + scan)
        run: |
          bash scripts/check-fixy-spawn-discipline.sh --self-test
          bash scripts/check-fixy-spawn-discipline.sh

      - name: row-contains discipline (self-test + scan)
        run: |
          bash scripts/check-row-contains-discipline.sh --self-test
          bash scripts/check-row-contains-discipline.sh

      - name: fixy::is alias parity (self-test + scan)
        run: |
          bash scripts/check-isx-parity.sh --self-test
          bash scripts/check-isx-parity.sh

      - name: stub-vs-live discipline (self-test + scan)
        run: |
          bash scripts/check-stub-discipline.sh --self-test
          bash scripts/check-stub-discipline.sh

      - name: lock-free sibling-assert discipline (self-test + scan)
        run: |
          bash scripts/check-lock-free-asserts.sh --self-test
          bash scripts/check-lock-free-asserts.sh

      - name: mint inventory (self-test + drift check + HS14 floor)
        run: |
          bash scripts/gen-mint-inventory.sh --self-test
          bash scripts/gen-mint-inventory.sh --check
          bash scripts/gen-mint-inventory.sh --check-floor

      - name: fixy::grant namespace purity
        run: bash scripts/check-fixy-grant-namespace-purity.sh

      - name: splits_into orphan-specialization purity
        run: bash scripts/check-splits-into-orphan.sh

  # ---------------------------------------------------------------------------
  # Full compile + run + negative-compile + golden-binary suite, on a PUBLIC
  # fedora:rawhide container with stock GCC 16.1.1. This is the real build gate
  # and runs on every push/PR. CRUCIBLE_CXX=/usr/bin/g++ feeds the portable
  # toolchain file (cmake/Toolchain-gcc16.cmake), which derives the matching
  # gcc-ar / gcc-ranlib siblings + rpath from that basename — no patched build
  # needed. The sanitizer + BPF runtimes (libasan/libubsan/libbpf-devel) are
  # the only packages Fedora ships separately from gcc-c++.
  # ---------------------------------------------------------------------------
  build:
    name: build + test (fedora:rawhide, stock gcc-16, ccache)
    needs: guards
    runs-on: ubuntu-latest
    container: fedora:rawhide
    env:
      CRUCIBLE_CXX: /usr/bin/g++
      # ccache lives at an absolute path (not in $WORKSPACE) so it survives the
      # checkout wipe and is cached as a whole directory by actions/cache.
      CCACHE_DIR: /ccache
      CCACHE_MAXSIZE: "5G"
      CCACHE_COMPRESS: "true"
      # The build is deterministic (no __DATE__/__TIME__; -fno-fast-math), so
      # the default ccache hashing is safe — every reflection/contract flag is
      # part of the command line and thus part of the hash.
    steps:
      # Minimal tooling actions/cache needs to pack/unpack inside the container.
      # Runs before any cache step (chicken-and-egg: can't cache the cache tool).
      - name: Bootstrap cache tooling
        run: dnf install -y --setopt=install_weak_deps=False tar zstd

      # Restore the rawhide RPM cache so the toolchain install skips downloads.
      # Unique key per run + restore-keys fallback => always restore newest,
      # always save a fresh entry on success (standard rolling-cache pattern).
      - name: Restore dnf package cache
        uses: actions/cache@v4
        with:
          path: /var/cache/dnf
          key: dnf-rawhide-${{ github.run_id }}
          restore-keys: dnf-rawhide-

      # git is needed by actions/checkout; keepcache=1 retains RPMs for the
      # dnf-cache save. ccache itself is installed here.
      - name: Install toolchain + sanitizer/BPF runtimes + ccache
        run: >
          dnf install -y --setopt=install_weak_deps=False --setopt=keepcache=1
          gcc-c++ libasan libubsan
          cmake ninja-build git ripgrep libbpf-devel ccache

      # Restore the compiled-object cache. Keyed by branch+sha (never an exact
      # hit -> always saves a fresh entry); restore-keys walk back to the
      # newest entry on this branch, then main, then anything.
      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: /ccache
          key: ccache-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ github.ref_name }}-
            ccache-main-
            ccache-

      - name: Checkout
        uses: actions/checkout@v4

      # The one ci_guard that needs a compiler: it traces #include edges with
      # `g++ -H`. CRUCIBLE_CXX (=/usr/bin/g++, GCC 16) is picked up by the
      # script. Runs before the build so a header-bloat regression fails fast.
      - name: session-persistence include audit (needs gcc-16)
        run: bash scripts/check-session-persistence-include-audit.sh

      # CMAKE_*_COMPILER_LAUNCHER=ccache composes with the toolchain file: CMake
      # invokes `ccache /usr/bin/g++ ...`, leaving compiler/ar/rpath resolution
      # (cmake/Toolchain-gcc16.cmake) untouched.
      - name: Configure (stock gcc-16 + ccache launcher)
        run: >
          cmake --preset default
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Reset ccache stats
        run: ccache -z

      - name: Build
        run: cmake --build --preset default

      # Hit rate lands in the job log — the headline metric for this cache setup.
      - name: ccache stats
        run: ccache -s

      # The entire ctest set: C++ unit/compile tests, the negative-compile
      # fixtures, row_hash_golden_diff (built binary), AND the ci_guard bash
      # guards (harmless duplication with the guards job).
      - name: Test
        run: ctest --preset default

  # ---------------------------------------------------------------------------
  # OPTIONAL byte-exact-parity job on the patched GCC 16.1.1 (PR c++/124241).
  # Stock gcc differs from the dev compiler only by that one contracts-cache
  # commit; this job exists for gating on the EXACT dev toolchain + TSan. Gated
  # to manual dispatch so it never silently "passes" by being skipped where the
  # patched toolchain is absent — it runs only on a self-hosted runner that has
  # g++-16p installed (point it via CRUCIBLE_GCC16_PREFIX / CRUCIBLE_CXX, per
  # cmake/Toolchain-gcc16.cmake).
  # ---------------------------------------------------------------------------
  build-patched-parity:
    name: build + test (patched gcc-16, exact parity)
    needs: guards
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: [ self-hosted, gcc16-patched ]
    env:
      # Leave unset to use the $HOME/.local/gcc16-patched default prefix.
      CRUCIBLE_GCC16_PREFIX: ${{ vars.CRUCIBLE_GCC16_PREFIX }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (portable toolchain resolution)
        run: cmake --preset default

      - name: Build
        run: cmake --build --preset default

      - name: Test
        run: ctest --preset default

      # Bit-exact / cross-build determinism + ThreadSanitizer gates, per the
      # CLAUDE.md §XIII pre-merge matrix. Uncomment when a TSan-capable runner
      # is available.
      # - name: ThreadSanitizer
      #   run: |
      #     cmake --preset tsan
      #     cmake --build --preset tsan
      #     ctest --preset tsan
