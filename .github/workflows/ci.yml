# Crucible CI — GitHub-hosted, full-coverage, no compromises.
#
# Runs entirely on free GitHub-hosted Linux runners (x86_64 + aarch64). No
# self-hosted runners (security). Every push to every branch gets its own run
# to completion — runs are NEVER cancelled (no `concurrency` block), so the
# history is fully observable and bisectable.
#
# Tiers:
#   * guards  — bash/ripgrep discipline suite. ubuntu-latest, no compiler.
#   * build   — matrix(arch × preset) full compile + ctest, in a fedora:rawhide
#               container with stock GCC 16.1.1 (CRUCIBLE_CXX=/usr/bin/g++).
#               BPF substrate ENABLED (clang+xxd+libbpf+bpftool present), so the
#               whole library — perf/cntp/canopy/topology/observe/cog BPF
#               programs + crucible_vessel — compiles. aarch64 regenerates
#               vmlinux.h from the runner kernel's BTF (the committed header is
#               x86_64). Presets carry the sanitizer choice: default=ASan/UBSan,
#               tsan=TSan, release=-O3, analyzer=-fanalyzer.
#   * bench   — release+bench preset, COMPILE gate only (shared-runner perf is
#               noisy; numbers would flake, builds catch real regressions).
#   * fuzz    — default+CRUCIBLE_FUZZ, build + run the Philox-seeded property
#               smoke (--iters=1000, deterministic, not flaky).
#
# Toolchain honesty: the dev `default` preset uses a locally-built GCC 16.1.1
# with ONE extra commit — PR c++/124241 (contracts consteval-cache-bypass fix).
# Stock Fedora gcc-16.1.1 differs ONLY by that commit. The CRUCIBLE_PRE /
# CRUCIBLE_POST migration exists precisely so the consteval-sensitive contracts
# fire identically on stock GCC. The two neg-compile fixtures that assert an
# in-body consteval contract_assert poisons the enclosing call DO require the
# patched compiler, so the `ctest -E` below excludes them on stock GCC; they
# are exercised on the dev box.
#
# Caching (public repo, free cache): ccache wraps the compiler (objects restored
# per arch+preset across runs) and /var/cache/dnf is cached per arch. A hash
# miss only recompiles; a stale hit would surface as a ctest failure.
#
# The guard list below is kept 1:1 with the `ci_guard` registrations in
# test/CMakeLists.txt.

name: ci

on:
  push:
    branches: [ '**' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Toolchain-FREE discipline guards. Stock ubuntu-latest, no compiler, no
  # CMake configure — pure source-tree scans.
  # ---------------------------------------------------------------------------
  guards:
    name: discipline guards (toolchain-free)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ripgrep

      - name: trait injection guard
        run: bash scripts/check-trait-injection.sh

      - name: contract cite regression (pre-callsite count vs baseline)
        run: bash scripts/audit-pre-callsite-count.sh --check scripts/contracts-baseline.json

      - name: contract decide-cite ratio
        run: bash scripts/audit-decide-cite-ratio.sh

      - name: refined/pre subsumption (self-test + scan)
        run: |
          bash scripts/check-refined-pre-subsumption.sh --self-test
          bash scripts/check-refined-pre-subsumption.sh

      - name: fixy discipline (self-test + scan)
        run: |
          bash scripts/check-fixy-discipline.sh --self-test
          bash scripts/check-fixy-discipline.sh

      - name: mint pattern (self-test + scan)
        run: |
          bash scripts/check-mint-pattern.sh --self-test
          bash scripts/check-mint-pattern.sh

      - name: permission storage antipattern (self-test + scan)
        run: |
          bash scripts/check-permission-storage.sh --self-test
          bash scripts/check-permission-storage.sh

      - name: no vector::reserve (self-test + scan)
        run: |
          bash scripts/check-no-reserve.sh --self-test
          bash scripts/check-no-reserve.sh

      - name: no raw fstream (self-test + scan)
        run: |
          bash scripts/check-no-raw-ofstream.sh --self-test
          bash scripts/check-no-raw-ofstream.sh

      - name: fixy hardware discipline (self-test + scan)
        run: |
          bash scripts/check-fixy-hw-discipline.sh --self-test
          bash scripts/check-fixy-hw-discipline.sh

      - name: no reinterpret_cast (self-test + scan)
        run: |
          bash scripts/check-no-reinterpret-cast.sh --self-test
          bash scripts/check-no-reinterpret-cast.sh

      - name: no -ffast-math (self-test + scan)
        run: |
          bash scripts/check-no-ffast-math.sh --self-test
          bash scripts/check-no-ffast-math.sh

      - name: fixy clean headers (self-test + scan)
        run: |
          bash scripts/check-fixy-clean-headers.sh --self-test
          bash scripts/check-fixy-clean-headers.sh

      - name: fixy dimension prose
        run: bash scripts/check-fixy-dim-prose.sh

      - name: syscall capability admission (self-test + scan)
        run: |
          bash scripts/check-syscall-capability.sh --self-test
          bash scripts/check-syscall-capability.sh

      - name: spawn discipline (self-test + scan)
        run: |
          bash scripts/check-fixy-spawn-discipline.sh --self-test
          bash scripts/check-fixy-spawn-discipline.sh

      - name: row-contains discipline (self-test + scan)
        run: |
          bash scripts/check-row-contains-discipline.sh --self-test
          bash scripts/check-row-contains-discipline.sh

      - name: fixy::is alias parity (self-test + scan)
        run: |
          bash scripts/check-isx-parity.sh --self-test
          bash scripts/check-isx-parity.sh

      - name: stub-vs-live discipline (self-test + scan)
        run: |
          bash scripts/check-stub-discipline.sh --self-test
          bash scripts/check-stub-discipline.sh

      - name: lock-free sibling-assert discipline (self-test + scan)
        run: |
          bash scripts/check-lock-free-asserts.sh --self-test
          bash scripts/check-lock-free-asserts.sh

      - name: mint inventory (self-test + drift check + HS14 floor)
        run: |
          bash scripts/gen-mint-inventory.sh --self-test
          bash scripts/gen-mint-inventory.sh --check
          bash scripts/gen-mint-inventory.sh --check-floor

      - name: fixy::grant namespace purity
        run: bash scripts/check-fixy-grant-namespace-purity.sh

      - name: splits_into orphan-specialization purity
        run: bash scripts/check-splits-into-orphan.sh

  # ---------------------------------------------------------------------------
  # Full compile + run + negative-compile + golden-binary suite. Matrix over
  # (arch × preset) in a fedora:rawhide container with stock GCC 16.1.1. BPF
  # substrate ENABLED — the perf/network BPF programs + crucible_vessel all
  # compile. fail-fast:false: an aarch64-specific issue (e.g. BTF availability)
  # never cancels the x86_64 legs.
  # ---------------------------------------------------------------------------
  build:
    name: build+test ${{ matrix.arch }} / ${{ matrix.preset }}
    needs: guards
    runs-on: ${{ matrix.runner }}
    container: fedora:rawhide
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86_64 — committed vmlinux.h is x86_64, no regen needed.
          - { arch: x86_64,  runner: ubuntu-24.04,     preset: default,  jobs: 3, regen_btf: false, run_tests: true  }
          - { arch: x86_64,  runner: ubuntu-24.04,     preset: tsan,     jobs: 3, regen_btf: false, run_tests: true  }
          - { arch: x86_64,  runner: ubuntu-24.04,     preset: release,  jobs: 2, regen_btf: false, run_tests: true  }
          - { arch: x86_64,  runner: ubuntu-24.04,     preset: analyzer, jobs: 2, regen_btf: false, run_tests: false }
          # aarch64 — regenerate vmlinux.h from the runner kernel's BTF.
          - { arch: aarch64, runner: ubuntu-24.04-arm, preset: default,  jobs: 3, regen_btf: true,  run_tests: true  }
          - { arch: aarch64, runner: ubuntu-24.04-arm, preset: tsan,     jobs: 3, regen_btf: true,  run_tests: true  }
          - { arch: aarch64, runner: ubuntu-24.04-arm, preset: release,  jobs: 2, regen_btf: true,  run_tests: true  }
    env:
      CRUCIBLE_CXX: /usr/bin/g++
      # ccache lives at an absolute path (survives the checkout wipe) and is
      # cached as a whole directory per arch+preset.
      CCACHE_DIR: /ccache
      # ~14 GB runner disk shared with the container + dnf cache + build tree;
      # 2 G keeps the cache-save post-step from wedging and stays under the
      # 10 GB/repo Actions cache quota.
      CCACHE_MAXSIZE: "2G"
      CCACHE_COMPRESS: "true"
    steps:
      # Minimal tooling actions/cache needs to pack/unpack inside the container.
      - name: Bootstrap cache tooling
        run: dnf install -y --setopt=install_weak_deps=False tar zstd

      - name: Restore dnf package cache
        uses: actions/cache@v4
        with:
          path: /var/cache/dnf
          key: dnf-${{ matrix.arch }}-${{ github.run_id }}
          restore-keys: dnf-${{ matrix.arch }}-

      # Full toolchain + BPF stack + sanitizer runtimes. clang+xxd+bpftool flip
      # CRUCIBLE_HAVE_BPF=ON (cmake/CrucibleBpf.cmake); libasan/libubsan/libtsan
      # back the default/tsan presets; libbpf-devel provides bpf_helpers.h.
      - name: Install toolchain + BPF stack + sanitizers + ccache
        run: >
          dnf install -y --setopt=install_weak_deps=False --setopt=keepcache=1
          gcc-c++ cmake ninja-build git ripgrep ccache
          clang llvm xxd bpftool libbpf-devel
          libasan libubsan libtsan liblsan

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: /ccache
          key: ccache-${{ matrix.arch }}-${{ matrix.preset }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ matrix.arch }}-${{ matrix.preset }}-${{ github.ref_name }}-
            ccache-${{ matrix.arch }}-${{ matrix.preset }}-main-
            ccache-${{ matrix.arch }}-${{ matrix.preset }}-

      - name: Checkout
        uses: actions/checkout@v4

      # The committed vmlinux.h is an x86_64 BTF dump; on aarch64 the BPF
      # programs need the matching arm64 layout. Regenerate it from the runner
      # kernel's BTF (CO-RE: compile-time types, load-time relocation). Fails
      # loudly if BTF is absent so the cause is unambiguous.
      - name: Regenerate vmlinux.h from runner BTF (aarch64)
        if: ${{ matrix.regen_btf }}
        run: |
          test -r /sys/kernel/btf/vmlinux || { echo "::error::/sys/kernel/btf/vmlinux not readable in container"; exit 1; }
          bpftool btf dump file /sys/kernel/btf/vmlinux format c > include/crucible/perf/bpf/vmlinux.h
          echo "regenerated $(wc -l < include/crucible/perf/bpf/vmlinux.h) lines for ${{ matrix.arch }}"

      # The one ci_guard that needs a compiler (traces #include edges via g++ -H).
      - name: session-persistence include audit (needs gcc-16)
        run: bash scripts/check-session-persistence-include-audit.sh

      # Presets carry the sanitizer/build-type choice; no -DCRUCIBLE_* overrides
      # except the ccache launchers (which compose with cmake/Toolchain-gcc16.cmake).
      - name: Configure (${{ matrix.preset }}, stock gcc-16, BPF on, ccache)
        run: >
          cmake --preset ${{ matrix.preset }}
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Reset ccache stats
        run: ccache -z

      # -jN overrides the preset's jobs:192. 4 vCPU / 16 GB runners; sanitizer
      # and -fanalyzer TUs are memory-heavy, so jobs is tuned per preset. The
      # analyzer preset is restricted to the `crucible` library target —
      # -fanalyzer over the full ~1000-TU test tree would blow the wall-clock
      # budget, and the static-analysis findings that matter live in the
      # compiled library surface.
      - name: Build
        run: >
          cmake --build --preset ${{ matrix.preset }} -j ${{ matrix.jobs }}
          ${{ matrix.preset == 'analyzer' && '--target crucible' || '' }}

      - name: ccache stats
        run: ccache -s

      # -E excludes the two neg-compile fixtures whose rejection needs PR
      # c++/124241 (patched g++); stock GCC 16.1.1 lacks it. Skipped for the
      # analyzer preset (build-time -fanalyzer findings are its coverage).
      - name: Test
        if: ${{ matrix.run_tests }}
        run: ctest --preset ${{ matrix.preset }} -j ${{ matrix.jobs }} -E 'neg_graded_regime[23]_ctor_grade_mismatch'

  # ---------------------------------------------------------------------------
  # Benchmark COMPILE gate. Shared-runner perf numbers are meaningless (noisy /
  # throttled), so this builds the bench tree to catch compile regressions and
  # does NOT run perf-gated assertions. x86_64 only.
  # ---------------------------------------------------------------------------
  bench:
    name: bench (compile gate, x86_64)
    needs: guards
    runs-on: ubuntu-24.04
    container: fedora:rawhide
    env:
      CRUCIBLE_CXX: /usr/bin/g++
      CCACHE_DIR: /ccache
      CCACHE_MAXSIZE: "2G"
      CCACHE_COMPRESS: "true"
    steps:
      - name: Bootstrap cache tooling
        run: dnf install -y --setopt=install_weak_deps=False tar zstd
      - name: Restore dnf package cache
        uses: actions/cache@v4
        with:
          path: /var/cache/dnf
          key: dnf-x86_64-${{ github.run_id }}
          restore-keys: dnf-x86_64-
      - name: Install toolchain + BPF stack + ccache
        run: >
          dnf install -y --setopt=install_weak_deps=False --setopt=keepcache=1
          gcc-c++ cmake ninja-build git ripgrep ccache
          clang llvm xxd bpftool libbpf-devel
      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: /ccache
          key: ccache-x86_64-bench-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ccache-x86_64-bench-${{ github.ref_name }}-
            ccache-x86_64-bench-main-
            ccache-x86_64-bench-
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure (bench, ccache)
        run: >
          cmake --preset bench
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
      - name: Build benches
        run: cmake --build --preset bench -j 3
      - name: ccache stats
        run: ccache -s

  # ---------------------------------------------------------------------------
  # Fuzz smoke. Property fuzzers are plain GCC + ASan/UBSan with Philox-seeded
  # input (deterministic, not flaky). Build + run the short --iters=1000 smoke.
  # x86_64 only.
  # ---------------------------------------------------------------------------
  fuzz:
    name: fuzz (property smoke, x86_64)
    needs: guards
    runs-on: ubuntu-24.04
    container: fedora:rawhide
    env:
      CRUCIBLE_CXX: /usr/bin/g++
      CCACHE_DIR: /ccache
      CCACHE_MAXSIZE: "2G"
      CCACHE_COMPRESS: "true"
    steps:
      - name: Bootstrap cache tooling
        run: dnf install -y --setopt=install_weak_deps=False tar zstd
      - name: Restore dnf package cache
        uses: actions/cache@v4
        with:
          path: /var/cache/dnf
          key: dnf-x86_64-${{ github.run_id }}
          restore-keys: dnf-x86_64-
      - name: Install toolchain + BPF stack + sanitizers + ccache
        run: >
          dnf install -y --setopt=install_weak_deps=False --setopt=keepcache=1
          gcc-c++ cmake ninja-build git ripgrep ccache
          clang llvm xxd bpftool libbpf-devel
          libasan libubsan liblsan
      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: /ccache
          key: ccache-x86_64-fuzz-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ccache-x86_64-fuzz-${{ github.ref_name }}-
            ccache-x86_64-fuzz-main-
            ccache-x86_64-fuzz-
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure (default + CRUCIBLE_FUZZ, ccache)
        run: >
          cmake --preset default
          -DCRUCIBLE_FUZZ=ON
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
      - name: Build fuzzers
        run: cmake --build --preset default -j 3
      - name: ccache stats
        run: ccache -s
      - name: Run property-fuzz smoke
        run: ctest --preset default -j 3 -L fuzz_property
