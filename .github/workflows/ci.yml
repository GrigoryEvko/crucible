# Crucible CI — GitHub-hosted, full-coverage, no compromises.
#
# DISPATCHER. This workflow does NOT build anything itself: on every push it
# enumerates the commits that arrived in that push and fans the reusable core
# (ci-reusable.yml — guards + build matrix + bench + fuzz) out ONCE PER COMMIT,
# newest commit first. So pushing 20 commits at once builds all 20 (not just
# the tip, which is GitHub's default), each checked out at its own SHA and
# showing its own checks. pull_request / workflow_dispatch run a single
# invocation on the head SHA.
#
# Runs entirely on free GitHub-hosted Linux runners (x86_64 + aarch64). No
# self-hosted runners (security). Every push to every branch gets its own runs
# to completion — runs are NEVER cancelled (no `concurrency` block), so the
# history is fully observable and bisectable. The per-commit fan-out is
# concurrent (GitHub schedules up to its account job-cap; newest commit's jobs
# are queued first so it finishes soonest).
#
# Tiers (in ci-reusable.yml):
#   * guards  — bash/ripgrep discipline suite. ubuntu-latest, no compiler.
#   * build   — matrix(arch × preset) full compile + ctest, in a fedora:rawhide
#               container with stock GCC 16.1.1 (CRUCIBLE_CXX=/usr/bin/g++).
#               BPF substrate ENABLED. aarch64 regenerates vmlinux.h from the
#               runner kernel's BTF. Presets carry the sanitizer choice.
#   * bench   — release+bench preset, COMPILE gate only.
#   * fuzz    — default+CRUCIBLE_FUZZ, build + run the Philox-seeded smoke.
#
# Toolchain honesty: the dev `default` preset uses a locally-built GCC 16.1.1
# with ONE extra commit — PR c++/124241 (contracts consteval-cache-bypass fix).
# Stock Fedora gcc-16.1.1 differs ONLY by that commit; the two neg-compile
# fixtures that need the patch are excluded via `ctest -E` on stock GCC.
#
# Caching (public repo, free cache): ccache wraps the compiler (objects restored
# per arch+preset across runs, split restore/save so even failed runs bank
# progress). Within one push's fan-out all per-commit calls share github.run_id,
# so the ccache save key collides across commits — first-to-save wins (the
# newest commit), the rest restore from it; ccache content is shared by content,
# so this keeps the 10 GB cache pool from fragmenting per commit.
#
# ============================================================================
# BILLING — THIS PIPELINE COSTS $0. KEEP IT THAT WAY. DO NOT CHANGE.
# ============================================================================
# Per GitHub Actions billing: standard GitHub-hosted runners are FREE, with NO
# minute cap, for PUBLIC repositories. The monthly free-minute quota
# (2,000/mo on Free) applies to PRIVATE repos only — it does not apply here.
# These invariants keep every run permanently free. Violating any one bills:
#
#   1. Repo stays PUBLIC. Flipping to private turns on the per-minute quota +
#      overage billing (Linux $0.006/min, arm64 $0.005/min, Windows $0.010/min).
#
#   2. Standard runners ONLY. Use exactly the labels in ci-reusable.yml —
#      `ubuntu-latest`, `ubuntu-24.04` (x64), `ubuntu-24.04-arm` (arm64, GA +
#      free for public). NEVER add a "larger runner" (runner group,
#      `*-4-core`/`*-8-core`/`xl`, GPU, or extra-RAM/storage SKU): larger
#      runners are ALWAYS billed, even on public repos. The fedora:rawhide
#      container is free — billing is by the host runner, not the container.
#
#   3. NEVER raise the repo's Actions cache limit above the default 10 GB. Our
#      per-(arch,preset) ccache caches can total >10 GB; that is fine — GitHub
#      auto-evicts LRU caches to stay under 10 GB (free, costs only a cache
#      miss). You are billed for cache ONLY if you manually raise the limit and
#      exceed it ($0.07/GiB-month). Also: do NOT add upload-artifact.
#
#   NOTE: per-commit fan-out multiplies runs by the number of pushed commits.
#   Free on a public repo, but it is real compute — the enumerate job caps the
#   fan-out at the newest 50 commits per push as a runaway guard (and to stay
#   under GitHub's 256-entry matrix limit). Larger pushes log what was dropped.
# ============================================================================

name: ci

on:
  push:
    branches: [ '**' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Enumerate the commits to build. On push: every commit in before..after,
  # newest-first (git rev-list default order), capped at 50. On PR: the PR head
  # SHA. On workflow_dispatch / new-branch (zero `before`): just the tip.
  # Emits a JSON array consumed by the `ci` matrix below.
  # ---------------------------------------------------------------------------
  enumerate:
    name: enumerate pushed commits
    runs-on: ubuntu-latest
    outputs:
      shas: ${{ steps.list.outputs.shas }}
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute commit list (newest-first)
        id: list
        env:
          EVENT: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          zero='0000000000000000000000000000000000000000'
          case "$EVENT" in
            pull_request)
              list="$PR_HEAD" ;;
            push)
              if [ -z "$BEFORE" ] || [ "$BEFORE" = "$zero" ]; then
                # New branch / unknown base — build the tip only.
                list="$AFTER"
              else
                # Newest-first, capped in git itself (no SIGPIPE under pipefail).
                list="$(git rev-list -n 50 "$BEFORE..$AFTER" 2>/dev/null || true)"
                [ -n "$list" ] || list="$AFTER"
              fi ;;
            *)
              list="$AFTER" ;;
          esac
          count=$(printf '%s\n' $list | grep -c .)
          echo "fan-out over $count commit(s), newest-first:"
          printf '  %s\n' $list
          if [ "$EVENT" = push ] && [ "$BEFORE" != "$zero" ] && [ -n "$BEFORE" ]; then
            total=$(git rev-list --count "$BEFORE..$AFTER" 2>/dev/null || echo "$count")
            if [ "$total" -gt "$count" ]; then
              echo "::warning::push had $total commits; capped fan-out to newest $count (matrix/runaway guard)"
            fi
          fi
          shas="$(printf '%s\n' $list | jq -R . | jq -cs .)"
          echo "shas=$shas" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Per-commit fan-out. One full ci-reusable invocation per SHA, concurrent,
  # newest-first (matrix preserves the enumerate order). fail-fast:false so one
  # commit's failure never cancels the others; no `concurrency` block so a newer
  # push never cancels these.
  # ---------------------------------------------------------------------------
  ci:
    needs: enumerate
    strategy:
      fail-fast: false
      matrix:
        sha: ${{ fromJSON(needs.enumerate.outputs.shas) }}
    name: ci ${{ matrix.sha }}
    uses: ./.github/workflows/ci-reusable.yml
    with:
      sha: ${{ matrix.sha }}
