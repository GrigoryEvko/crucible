<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Crucible Live Trace</title>
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      background: #0f1115;
      color: #e5e7eb;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      grid-template-rows: 36px 1fr;
    }

    header {
      align-items: center;
      border-bottom: 1px solid #272b34;
      display: flex;
      gap: 12px;
      padding: 0 12px;
    }

    #status {
      border-radius: 999px;
      display: inline-block;
      height: 8px;
      width: 8px;
    }

    #status.open {
      background: #22c55e;
    }

    #status.closed {
      background: #ef4444;
    }

    #endpoint {
      background: transparent;
      border: 1px solid #374151;
      border-radius: 4px;
      color: inherit;
      flex: 1;
      font: inherit;
      height: 24px;
      padding: 0 8px;
    }

    button {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 4px;
      color: inherit;
      cursor: pointer;
      height: 26px;
      padding: 0 10px;
    }

    main {
      overflow: auto;
    }

    #viewport {
      min-height: 100%;
    }

    #viewport svg {
      display: block;
      height: auto;
      min-height: 100%;
      width: 100%;
    }
  </style>
</head>
<body>
  <header>
    <span id="status" class="closed"></span>
    <input id="endpoint" value="ws://127.0.0.1:8765/live-trace" spellcheck="false">
    <button id="connect" type="button">Connect</button>
  </header>
  <main>
    <div id="viewport"></div>
  </main>
  <script>
    const statusDot = document.getElementById("status");
    const endpoint = document.getElementById("endpoint");
    const button = document.getElementById("connect");
    const viewport = document.getElementById("viewport");
    let socket = null;

    function setOpen(isOpen) {
      statusDot.className = isOpen ? "open" : "closed";
      button.textContent = isOpen ? "Disconnect" : "Connect";
    }

    function closeSocket() {
      if (socket !== null) {
        socket.close();
        socket = null;
      }
      setOpen(false);
    }

    function connect() {
      closeSocket();
      socket = new WebSocket(endpoint.value);
      socket.addEventListener("open", () => setOpen(true));
      socket.addEventListener("close", closeSocket);
      socket.addEventListener("error", closeSocket);
      socket.addEventListener("message", (event) => {
        if (typeof event.data !== "string") return;
        const trimmed = event.data.trimStart();
        if (!trimmed.startsWith("<svg") && !trimmed.startsWith("<?xml")) return;
        viewport.innerHTML = event.data;
      });
    }

    button.addEventListener("click", () => {
      if (socket !== null && socket.readyState === WebSocket.OPEN) {
        closeSocket();
      } else {
        connect();
      }
    });
  </script>
</body>
</html>
